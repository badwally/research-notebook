field: AI for Longitudinal Temporal Video Analysis
branches:
- name: Action Recognition & Classification
  description: This research area focuses on correctly identifying and categorizing
    human actions or events within trimmed or continuous video streams [1-3].
  sub_branches:
  - name: Skeleton-Based and Pose-Guided Methods
    description: Architectures that leverage human pose topology and joint coordinates,
      rather than raw pixels, to model dynamic movement [4, 5].
    methods:
    - Spatial Temporal Graph Convolutional Networks (ST-GCN) [2]
    - Recurrent Pose-Attention Network (RPAN) [6]
  - name: Convolutional and Recurrent Architectures
    description: Methods that process spatial features using 2D/3D CNNs and capture
      temporal dynamics using recurrent nodes like LSTMs [7-9].
    methods:
    - VideoLSTM (Convolutional Attention LSTM) [10]
    - 3D CNNs with Spatio-Temporal Filter Analysis (i3D ResNet) [7, 11]
  - name: Few-Shot and Unsupervised Learning
    description: Techniques designed to recognize actions using limited labeled examples
      or by leveraging self-supervised signals from the data itself [12, 13].
    methods:
    - Spatio-Temporal Relation Modeling (STRM) [14]
    - Temporal Aware Embedding Network (TAEN) [15]
    - Video Playback Rate Perception (PRP) [16]
- name: Temporal Action Detection & Localization
  description: This area extends basic recognition by actively predicting the precise
    temporal boundaries (start and end times) of specific actions within long, untrimmed
    videos [1, 17, 18].
  sub_branches:
  - name: Transformer and Attention-Based Detectors
    description: Models using self-attention mechanisms to relate frames across sequences,
      often addressing issues like temporal feature collapse or rank loss [19, 20].
    methods:
    - Self-Feedback DETR [19]
    - TriDet (Relative Boundary Modeling) [18]
  - name: Graph-Based Localization
    description: Approaches that represent video snippets as nodes in a graph to exploit
      semantic and temporal correlations between segments [21, 22].
    methods:
    - G-TAD (Sub-Graph Localization) [21]
    - GCAN (Graph-based Class-level Attention Network) [22]
  - name: Boundary Refinement and Post-Processing
    description: Techniques applied to adjust and refine predicted action boundaries,
      minimizing quantization errors from temporal downsampling [23, 24].
    methods:
    - Gaussian Approximated Post-processing (GAP) [23]
- name: Video Object Tracking & Trajectory Prediction
  description: This field is dedicated to spatially identifying objects and tracking
    their locations, identities, and future trajectories over time [25, 26].
  sub_branches:
  - name: Multi-Object Tracking (MOT)
    description: Systems designed to maintain the identities of multiple moving targets
      across frames, handling challenges like severe occlusions [26, 27].
    methods:
    - FairMOT (Joint Detection and Re-ID via CenterNet) [28]
    - TransMOT (Spatial-Temporal Graph Transformer) [27]
    - TubeTK (Bounding Tube Regression) [29]
  - name: Trajectory and Movement Forecasting
    description: Architectures that analyze historical spatial positions to forecast
      the future paths of objects like pedestrians [25].
    methods:
    - GraphTCN (Graph Attention with Temporal Convolutional Networks) [30, 31]
    - Recurrent Autoregressive Networks (RAN) [32]
  - name: Specialized Domain Tracking
    description: Tracking solutions built for domain-specific challenges, such as
      biological microscopy, crowd density estimation, or unmanned aerial vehicles
      [33-35].
    methods:
    - Object-Level Warping Loss (for cell tracking) [34]
    - AutoTrack (Spatio-Temporal Regularization for UAVs) [33]
    - YOLOv8 + CSRNet hybrid (Stampede Risk Prediction) [36, 37]
- name: Video-Language Understanding & Grounding
  description: This area bridges computer vision and natural language processing,
    aiming to describe, retrieve, or answer questions about video content based on
    text [38-40].
  sub_branches:
  - name: Spatio-Temporal Video Grounding
    description: The task of localizing a specific spatial bounding box and temporal
      duration in a video corresponding to a given natural language query [39, 41].
    methods:
    - TubeDETR [39]
    - Collaborative Static and Dynamic Vision-Language Streams [41]
    - Text-Visual Prompting (TVP) [42]
  - name: Large Vision-Language Models (VLMs)
    description: Massive, pre-trained foundation models capable of reasoning over
      visual sequences to perform complex instruction-following and grounding [43,
      44].
    methods:
    - Molmo2 (Open-weights Video Grounding) [43]
    - ReVisionLLM (Recursive VLM for hour-long videos) [44]
    - VideoChat-R1 (Reinforcement Fine-Tuning with GRPO) [45, 46]
  - name: Video Captioning and Question Answering
    description: Generating descriptive text for dense video segments or extracting
      precise answers based on multi-modal video context [47-49].
    methods:
    - iPerceive (Common-Sense Reasoning architecture) [49]
    - Multimodal Pretraining via MAsked Sequence to Sequence (MASS) [50]
- name: Biologically Inspired & Advanced Spatio-Temporal Computing
  description: Alternative paradigms that process spatial-temporal data through brain-inspired
    algorithms, geometric analysis, or specialized physics-based signals [51, 52].
  sub_branches:
  - name: Spiking Neural Networks (SNNs)
    description: Brain-inspired networks that process asynchronous streams of spikes
      instead of traditional static frames to drastically reduce noise and improve
      efficiency [53, 54].
    methods:
    - NeuCube (3D Brain-inspired architecture) [55, 56]
    - Spike Time Dependent Plasticity (STDP) Learning [57]
  - name: Signal Processing and Stabilization
    description: Traditional and advanced mathematical algorithms designed to map,
      stabilize, or encode motion fields [58, 59].
    methods:
    - Motion Vector Flow Instance (MVFI) with PCA/LDA [58, 60]
    - Fourier Phase Correlation with Log-Polar Transformation [59, 61]
